{% extends "base.html" %}
{% block title %}Itinerary — Haunt Trip Planner{% endblock %}

{% block content %}
<section class="card">
    <h2>Your Haunt Itinerary</h2>
</section>

<div id="itinerary-content">
    <div class="spinner"></div>
    <p class="loading-text">Loading itinerary...</p>
</div>

<section class="card" id="adjust-panel" style="display:none;">
    <h2>Adjust Schedule</h2>
    <div class="form-row">
        <div class="form-group">
            <label for="adjust-name">Attraction</label>
            <select id="adjust-name" onchange="populateAdjustDropdown()">
                <option value="">Select attraction...</option>
            </select>
        </div>
        <div class="form-group">
            <label for="adjust-date">Move to Date</label>
            <select id="adjust-date">
                <option value="">Select date...</option>
            </select>
        </div>
    </div>
    <button class="btn btn-primary" onclick="adjustSchedule()">Re-optimize</button>
</section>

<section class="card" id="discovery-panel" style="display:none;">
    <h2>Discovery Suggestions</h2>
    <div id="discovery-content"></div>
</section>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadItinerary();
    });
</script>
{% endblock %}
