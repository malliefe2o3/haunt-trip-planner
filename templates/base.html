<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Haunt Trip Planner{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="fog"></div>
    <div class="cobweb cobweb-top-left"></div>
    <div class="cobweb cobweb-top-right"></div>

    <div class="container">
        <h1 class="drip-text">Haunt Trip Planner</h1>

        <nav class="nav-bar">
            <a href="/setup" class="nav-link {% if request.path in ['/', '/setup'] %}active{% endif %}">Setup</a>
            <a href="/attractions" class="nav-link {% if request.path == '/attractions' %}active{% endif %}">Attractions</a>
            <a href="/review" class="nav-link {% if request.path == '/review' %}active{% endif %}">Review</a>
            <a href="/itinerary" class="nav-link {% if request.path == '/itinerary' %}active{% endif %}">Itinerary</a>
            <a href="/export-view" class="nav-link {% if request.path == '/export-view' %}active{% endif %}">Export</a>
        </nav>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
